databases:
  - name: cellexia-page-tailor-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: cellexia-page-tailor
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cellexia-page-tailor-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,read_translations,read_locales,read_orders
      - key: SHOPIFY_APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAGE_TAILOR_MODEL
        value: claude-opus-4-8
